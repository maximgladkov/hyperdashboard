<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hyperliquid · Profit ledger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#081613; --panel:#0C1F1B; --edge:#16332C; --ink:#E8F4EF;
    --dim:#6E8B82; --faint:#3A554D; --mint:#4FE3C1; --ember:#FF7A6B; --gold:#E5C97B;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Menlo,monospace;
    --sans:'Avenir Next','Segoe UI Variable','Segoe UI',system-ui,sans-serif;
  }
  * { box-sizing:border-box }
  body {
    margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font-family:var(--sans);
    padding:28px clamp(14px,4vw,44px) 40px;
    background-image:radial-gradient(1200px 400px at 80% -10%, rgba(79,227,193,.06), transparent);
  }
  header { display:flex; flex-wrap:wrap; gap:16px; justify-content:space-between; align-items:flex-end; margin-bottom:22px }
  .eyebrow { font-family:var(--mono); font-size:11px; letter-spacing:.18em; color:var(--mint) }
  h1 { margin:6px 0 0; font-size:clamp(26px,4vw,38px); font-weight:700; letter-spacing:-.02em }
  form { display:flex; gap:8px; flex:1 1 340px; max-width:560px }
  input {
    flex:1; background:var(--panel); border:1px solid var(--edge); border-radius:8px;
    color:var(--ink); font-family:var(--mono); font-size:13px; padding:10px 12px;
  }
  input:focus { outline:none; border-color:var(--mint) }
  .btn {
    background:var(--mint); color:#06231C; border:none; border-radius:8px;
    font-weight:700; padding:10px 18px; cursor:pointer; font-family:var(--sans); font-size:14px;
  }
  .btn:focus-visible { outline:2px solid var(--mint); outline-offset:2px }
  .btn.ghost {
    background:var(--panel); color:var(--mint); border:1px solid var(--edge);
    font-size:18px; line-height:1; padding:10px 14px;
  }
  .btn.ghost:disabled { opacity:.5; cursor:default }
  .btn.ghost.spin { animation:spin 1s linear infinite }
  @keyframes spin { to { transform:rotate(360deg) } }
  .strip { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:16px }
  .stat { background:var(--panel); border:1px solid var(--edge); border-radius:10px; padding:12px 18px; flex:1 1 140px }
  .stat .lbl { font-family:var(--mono); font-size:10px; letter-spacing:.14em; color:var(--dim); text-transform:uppercase }
  .stat .val { font-family:var(--mono); font-weight:700; margin-top:6px; font-size:20px }
  .stat .val.big { font-size:28px }
  .panel { background:var(--panel); border:1px solid var(--edge); border-radius:12px; padding:16px 18px; margin-bottom:16px }
  .phead { display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; align-items:center; margin-bottom:12px }
  .ptitle { font-size:15px; font-weight:700 }
  .psub { color:var(--dim); font-weight:400; font-size:13px }
  .toggles { display:flex; gap:10px; flex-wrap:wrap }
  .tgroup { display:flex; background:var(--bg); border-radius:8px; padding:3px; border:1px solid var(--edge) }
  .tgl { background:transparent; border:none; color:var(--dim); font-family:var(--mono); font-size:12px; padding:6px 12px; border-radius:6px; cursor:pointer }
  .tgl.on { background:rgba(79,227,193,.14); color:var(--mint) }
  .dinput {
    background:transparent; border:none; border-right:1px solid var(--edge); color:var(--dim);
    font-family:var(--mono); font-size:12px; padding:4px 8px; color-scheme:dark; width:120px;
  }
  .dinput:focus { outline:none; color:var(--ink) }
  .chartbox { position:relative; height:300px }
  .chartbox.short { height:180px }
  table { width:100%; border-collapse:collapse; margin-top:6px; font-family:var(--mono); font-size:13px }
  th { color:var(--faint); font-weight:500; font-size:10px; letter-spacing:.12em; text-transform:uppercase;
       padding:6px 8px; border-bottom:1px solid var(--edge); text-align:right }
  th:first-child { text-align:left }
  td { padding:7px 8px; text-align:right; border-bottom:1px solid rgba(22,51,44,.5) }
  td:first-child { text-align:left; color:var(--ink); font-weight:600 }
  .pos { color:var(--mint) } .neg { color:var(--ember) } .mut { color:var(--dim) }
  .cols { display:flex; flex-wrap:wrap; gap:16px }
  .cols .main { flex:2; min-width:340px } .cols .side { flex:1; min-width:260px; display:flex; flex-direction:column; gap:16px }
  .posrow { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(22,51,44,.5) }
  .posrow .meta { color:var(--dim); font-size:12px; font-family:var(--mono) }
  .bignum { font-family:var(--mono); font-size:26px; font-weight:700; margin-top:8px }
  .empty { color:var(--dim); padding:24px 0; text-align:center; font-size:13px }
  .loading { padding:60px; text-align:center; color:var(--dim); font-family:var(--mono); animation:pulse 1.2s infinite }
  .error { background:rgba(255,122,107,.14); border:1px solid var(--ember); border-radius:10px; padding:14px 16px; max-width:640px }
  footer { color:var(--faint); font-size:12px; margin-top:8px; max-width:720px; line-height:1.5 }
  @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important} }
  .tablewrap { overflow-x:auto; -webkit-overflow-scrolling:touch }
  #toast {
    position:fixed; left:50%; transform:translateX(-50%); bottom:22px; z-index:99;
    background:var(--panel); border:1px solid var(--edge); color:var(--ink);
    border-radius:10px; padding:10px 16px; font-family:var(--mono); font-size:13px;
    display:flex; gap:9px; align-items:center; box-shadow:0 8px 24px rgba(0,0,0,.45);
    max-width:calc(100vw - 32px);
  }
  #toast[hidden] { display:none }
  #toast .dot { width:8px; height:8px; border-radius:50%; background:var(--mint); animation:pulse 1.2s infinite; flex:none }
  #toast.err .dot { background:var(--ember); animation:none }
  @media (max-width:640px) {
    body { padding:16px 12px 28px }
    header { flex-direction:column; align-items:stretch; gap:12px; margin-bottom:16px }
    h1 { font-size:24px }
    form { flex:none; max-width:none }
    input { font-size:16px; padding:12px }
    .btn { padding:10px 14px }
    .strip { display:grid; grid-template-columns:1fr 1fr; gap:8px }
    .stat { padding:10px 12px; flex:none }
    .stat .val { font-size:16px }
    .stat .val.big { font-size:22px }
    .panel { padding:12px; border-radius:10px }
    .phead { flex-direction:column; align-items:stretch }
    .toggles { width:100% }
    .tgroup { flex:1 1 100% }
    .tgl { flex:1; padding:8px 6px }
    .dinput { flex:1; width:auto; min-width:0; padding:8px 6px }
    .chartbox { height:240px }
    table { min-width:460px }
    .cols .main, .cols .side { min-width:100%; flex:1 1 100% }
    .bignum { font-size:22px }
    .loading { padding:40px 12px }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">HYPERLIQUID · PERPS ACCOUNT</div>
    <h1>Profit ledger</h1>
  </div>
  <form id="addrForm">
    <input id="addr" spellcheck="false" value="0x78e497a06B12d767371389EbD04baF7C8225a98b" aria-label="Wallet address">
    <button class="btn" type="submit">Load</button>
    <button class="btn ghost" type="button" id="refreshBtn" aria-label="Refresh data" title="Refresh">⟳</button>
  </form>
</header>
<div id="app"><div class="loading">Querying Hyperliquid…</div></div>
<div id="toast" hidden><span class="dot"></span><span id="toastMsg"></span></div>

<script>
const API = "https://api.hyperliquid.xyz/info";
const PERIODS = [["day","24H"],["week","7D"],["month","30D"],["allTime","ALL"]];
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const MINT = "#4FE3C1", EMBER = "#FF7A6B", GOLD = "#E5C97B", DIM = "#6E8B82", EDGE = "#16332C";

let D = null;                 // loaded data (portfolio + clearinghouse)
let period = "month", metric = "pnl";
let mainChart = null, monthChart = null;
let currentUser = null;
let range = null;                     // custom {start,end} when period === "custom"
let winData = null;                   // {fills, funding, ledger} for the active window
const winCache = new Map();           // window key -> winData
let rsVal = "", reVal = "";           // date input values, preserved across renders

const info = async body => {
  const r = await fetch(API, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(`API ${r.status} on ${body.type}`);
  return r.json();
};

const usd = (v, sign=false) => {
  const n = Number(v)||0, a = Math.abs(n);
  const s = a >= 1000 ? a.toLocaleString("en-US",{maximumFractionDigits:0})
                      : a.toLocaleString("en-US",{maximumFractionDigits:2});
  return `${n<0?"−":sign&&n>0?"+":""}$${s}`;
};
const cls = v => Number(v) >= 0 ? "pos" : "neg";
const fdate = ms => new Date(ms).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"2-digit"});
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let lastRefresh = 0;

function showToast(msg, isErr = false, hideAfterMs = 0) {
  const t = document.getElementById("toast");
  t.hidden = false;
  t.classList.toggle("err", isErr);
  document.getElementById("toastMsg").textContent = msg;
  clearTimeout(showToast._h);
  if (hideAfterMs) showToast._h = setTimeout(hideToast, hideAfterMs);
}
function hideToast() { document.getElementById("toast").hidden = true; }

async function load(user) {
  const app = document.getElementById("app");
  const u = user.trim();
  // Soft mode: data is already on screen — keep it visible and refresh in place.
  const soft = !!D;
  if (soft) showToast(u.toLowerCase() === (currentUser||"").toLowerCase()
    ? "Refreshing…" : `Loading ${u.slice(0,6)}…${u.slice(-4)}`);
  else app.innerHTML = '<div class="loading">Querying Hyperliquid…</div>';
  try {
    if (!/^0x[a-fA-F0-9]{40}$/.test(u)) throw new Error("that doesn't look like an EVM address");
    const safe = p => p.catch(() => null);
    const [portfolio, clearing, spot, spotCtx, vaults, staking] = await Promise.all([
      info({ type:"portfolio", user:u }),
      info({ type:"clearinghouseState", user:u }),
      safe(info({ type:"spotClearinghouseState", user:u })),
      safe(info({ type:"spotMetaAndAssetCtxs" })),
      safe(info({ type:"userVaultEquities", user:u })),
      safe(info({ type:"delegatorSummary", user:u })),
    ]);
    // Commit new state only once everything needed to render has arrived.
    const prev = { D, currentUser, winData, range, period };
    D = { pmap: Object.fromEntries(portfolio), clearing, spot, spotCtx, vaults, staking };
    currentUser = u;
    range = null; winCache.clear();
    if (period === "custom") period = "month";
    try {
      winData = await getWinData();
    } catch (err) {
      D = prev.D; currentUser = prev.currentUser;
      winData = prev.winData; range = prev.range; period = prev.period;
      throw err;
    }
    try { localStorage.setItem("hlpnl:addr", u); } catch (e) {}
    lastRefresh = Date.now();
    render();
    hideToast();
  } catch (e) {
    if (soft) {
      showToast(`Refresh failed: ${e.message || e}`, true, 5000);
    } else {
      app.innerHTML = `<div class="error">Couldn't load this account: ${esc(e.message||e)}.
        If you opened this file directly and see "Failed to fetch", your browser may block file:// requests —
        try serving it (<span style="font-family:var(--mono)">python3 -m http.server</span>) or a different browser.</div>`;
    }
  }
}

// The single global window every chart and panel derives from.
// null means "all time"; presets anchor to the portfolio history's first point.
function currentWin() {
  if (period === "custom" && range) return { ...range };
  if (period === "allTime") return null;
  const h = D.pmap[period]?.pnlHistory;
  return h?.length ? { start: +h[0][0], end: Date.now() } : null;
}
function winLabel() {
  if (period === "custom" && range) return `${fdate(range.start)} – ${fdate(range.end)}`;
  if (period === "allTime") return "all time";
  return PERIODS.find(p => p[0] === period)[1];
}
async function getWinData() {
  const w = currentWin();
  const key = period === "custom" && range ? `c:${range.start}-${range.end}` : period;
  if (winCache.has(key)) return winCache.get(key);
  const data = await fetchRange(currentUser, w ? w.start : 0, w ? w.end : Date.now());
  winCache.set(key, data);
  return data;
}

// Deposits, withdrawals and transfers via userNonFundingLedgerUpdates,
// paginated the same way as funding.
async function fetchLedger(u, start, end) {
  let out = [], t = start;
  try {
    for (let i = 0; i < 20; i++) {
      const batch = await info({ type:"userNonFundingLedgerUpdates", user:u, startTime:t, endTime:end });
      if (!batch.length) break;
      out = out.concat(batch);
      if (batch.length < 500) break;
      t = Math.max(...batch.map(x => x.time)) + 1;
    }
  } catch (e) {}
  return out;
}

// Paginated fetch of fills + funding for an arbitrary [start, end] window.
// userFillsByTime caps at 2000 fills/request (10k most recent overall);
// userFunding caps at 500 events/request. Advance startTime past the last
// timestamp seen until a short page comes back.
async function fetchRange(u, start, end) {
  let fills = [], t = start;
  for (let i = 0; i < 10; i++) {
    const batch = await info({ type:"userFillsByTime", user:u, startTime:t, endTime:end });
    if (!batch.length) break;
    fills = fills.concat(batch);
    if (batch.length < 2000) break;
    t = Math.max(...batch.map(f => f.time)) + 1;
  }
  let funding = [], ft = start;
  try {
    for (let i = 0; i < 20; i++) {
      const batch = await info({ type:"userFunding", user:u, startTime:ft, endTime:end });
      if (!batch.length) break;
      funding = funding.concat(batch);
      if (batch.length < 500) break;
      ft = Math.max(...batch.map(f => f.time)) + 1;
    }
  } catch (e) {}
  const ledger = await fetchLedger(u, start, end);
  return { fills, funding, ledger };
}

function seriesFor() {
  const key = period === "custom" ? "allTime" : period;
  const p = D.pmap[key]; if (!p) return [];
  const src = metric === "pnl" ? p.pnlHistory : p.accountValueHistory;
  let s = (src||[]).map(([t,v]) => ({ t:+t, v:+v }));
  if (period === "custom" && range) {
    s = s.filter(pt => pt.t >= range.start && pt.t <= range.end);
    if (metric === "pnl" && s.length) {
      const base = s[0].v;
      s = s.map(pt => ({ t: pt.t, v: pt.v - base }));
    }
  }
  return s;
}

function rangePnl() {
  const h = D.pmap.allTime?.pnlHistory || [];
  const inR = h.filter(([t]) => +t >= range.start && +t <= range.end);
  return inR.length ? (+inR[inR.length-1][1]) - (+inR[0][1]) : 0;
}

function periodPnl(key) {
  const h = D.pmap[key]?.pnlHistory || [];
  return h.length ? (+h[h.length-1][1]) - (+h[0][1]) : 0;
}

// Buckets PnL deltas + deposits + withdrawals by month, or by day when the
// visible window is ≤ ~3 months. `win` is {start,end} or null for all time.
function buildBuckets(win, activeLedger) {
  const h = D.pmap.allTime?.pnlHistory || [];
  let pts = h.map(([t,v]) => ({ t:+t, v:+v }));
  if (win) pts = pts.filter(p => p.t >= win.start && p.t <= win.end);
  const spanDays = pts.length > 1 ? (pts[pts.length-1].t - pts[0].t) / 86400000
                 : win ? (win.end - win.start) / 86400000 : Infinity;
  const daily = !!win && spanDays <= 92;
  const keyOf = t => {
    const d = new Date(t);
    const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    return daily ? `${m}-${String(d.getDate()).padStart(2,"0")}` : m;
  };
  const labelOf = t => new Date(t).toLocaleDateString("en-GB",
    daily ? { day:"numeric", month:"short" } : { month:"short", year:"2-digit" });
  const map = new Map();
  const get = (k, t) => { if (!map.has(k)) map.set(k, { k, t, lastPnl:null, dep:0, wd:0 }); return map.get(k); };
  for (const p of pts) get(keyOf(p.t), p.t).lastPnl = p.v;
  for (const ev of activeLedger||[]) {
    const f = flowOf(ev);
    if (!f) continue;
    if (win && (ev.time < win.start || ev.time > win.end)) continue;
    const b = get(keyOf(ev.time), ev.time);
    if (f.dir === "in") b.dep += f.amt; else b.wd += f.amt;
  }
  const arr = [...map.values()].sort((a,b) => a.t - b.t);
  let prev = pts.length ? pts[0].v : 0;
  for (const b of arr) {
    if (b.lastPnl === null) b.pnl = 0;
    else { b.pnl = b.lastPnl - prev; prev = b.lastPnl; }
    b.label = labelOf(b.t);
  }
  return { arr, daily };
}

// USD mid prices for spot tokens, from spotMetaAndAssetCtxs (USDC-quoted pairs).
function spotPrices() {
  const res = { USDC: 1 };
  const sc = D.spotCtx;
  if (!Array.isArray(sc) || sc.length < 2) return res;
  const [meta, ctxs] = sc;
  const tok = i => meta.tokens?.[i]?.name;
  (meta.universe || []).forEach((pair, i) => {
    const [b, q] = pair.tokens || [];
    const mid = +(ctxs?.[i]?.midPx || 0);
    if (tok(q) === "USDC" && mid && !(tok(b) in res)) res[tok(b)] = mid;
  });
  return res;
}

// Total account value = perps margin + spot + vault equity + staked HYPE,
// matching what the Hyperliquid UI shows as portfolio value.
function accountBreakdown() {
  const px = spotPrices();
  const perp = +(D.clearing?.marginSummary?.accountValue || 0);
  const spot = (D.spot?.balances || []).reduce((s, b) => s + (+b.total || 0) * (px[b.coin] ?? 0), 0);
  const vault = (Array.isArray(D.vaults) ? D.vaults : []).reduce((s, v) => s + (+v.equity || 0), 0);
  const st = D.staking, hype = px["HYPE"] || 0;
  const staked = st ? ((+st.delegated || 0) + (+st.undelegated || 0) + (+st.totalPendingWithdrawal || 0)) * hype : 0;
  return { perp, spot, vault, staked, total: perp + spot + vault + staked };
}

// Classify a ledger event as external capital flow. Bridge withdrawals are
// type "withdraw"; direct sends to another Hyperliquid address (e.g. an
// exchange's HL deposit address) are internalTransfer/spotTransfer/usdSend —
// external only when the destination isn't this account. Own sub-account,
// perp↔spot and vault moves stay internal and are excluded.
function flowOf(ev) {
  const d = ev?.delta || {};
  const ty = d.type;
  const me = (currentUser || "").toLowerCase();
  const amt = Math.abs(+(d.usdc ?? d.usdcValue ?? d.amount ?? 0));
  if (!amt) return null;
  if (ty === "deposit") return { dir:"in", kind:"Deposit", amt };
  if (ty === "withdraw") return { dir:"out", kind:"Withdrawal", amt, fee:+d.fee||0 };
  if (ty === "internalTransfer" || ty === "spotTransfer" || ty === "usdSend" || ty === "send") {
    const dest = (d.destination || "").toLowerCase();
    const from = (d.user || "").toLowerCase();
    if (dest && dest !== me) return { dir:"out", kind:"Transfer out", amt, fee:+d.fee||0, to:d.destination };
    if (dest === me && from && from !== me) return { dir:"in", kind:"Transfer in", amt };
  }
  return null;
}

function byCoin(fills) {
  const agg = {};
  for (const f of fills||[]) {
    const a = agg[f.coin] ||= { coin:f.coin, realized:0, fees:0, trades:0, wins:0, closes:0 };
    const p = +f.closedPnl||0;
    a.realized += p; a.fees += +f.fee||0; a.trades++;
    if (p !== 0) { a.closes++; if (p>0) a.wins++; }
  }
  return Object.values(agg).map(a => ({...a, net:a.realized-a.fees})).sort((x,y)=>y.net-x.net);
}

function render() {
  const custom = period === "custom" && range;
  const acct = accountBreakdown();
  const eq = acct.total;
  const vol = +(D.pmap.allTime?.vlm||0);
  const activeFills = winData?.fills || [];
  const activeFunding = winData?.funding || [];
  const activeLedger = winData?.ledger || [];
  const coins = byCoin(activeFills);
  const totR = coins.reduce((s,c)=>s+c.realized,0), totF = coins.reduce((s,c)=>s+c.fees,0);
  const nTrades = coins.reduce((s,c)=>s+c.trades,0);
  const fundTot = (activeFunding||[]).reduce((s,f)=>s+(+f?.delta?.usdc||0),0);
  const positions = (D.clearing?.assetPositions||[]).map(p=>p.position).filter(p=>+p.szi!==0);
  const flows = { dep:0, depN:0, wd:0, wdN:0, recent:[] };
  for (const ev of activeLedger||[]) {
    const f = flowOf(ev);
    if (!f) continue;
    if (f.dir === "in") { flows.dep += f.amt; flows.depN++; }
    else { flows.wd += f.amt; flows.wdN++; flows.recent.push({ t:ev.time, kind:f.kind, amt:f.amt, fee:f.fee, to:f.to }); }
  }
  flows.recent.sort((a,b)=>b.t-a.t);
  const win = currentWin();
  const bk = buildBuckets(win, activeLedger);
  const wLbl = winLabel();

  document.getElementById("app").innerHTML = `
  <section class="strip">
    <div class="stat"><div class="lbl">Account value · spot</div><div class="val big">${usd(acct.spot)}</div>
      <div class="meta" style="color:var(--dim);font-size:11px;font-family:var(--mono);margin-top:4px">${
        [["Perps",acct.perp],["Vaults",acct.vault],["Staked",acct.staked],["Total",acct.total]]
          .filter(([,v])=>v>=0.5).map(([l,v])=>`${l} ${usd(v)}`).join(" · ")
      }</div></div>
    ${PERIODS.map(([k,l])=>{const v=periodPnl(k);return `
      <div class="stat"><div class="lbl">PnL ${l}</div><div class="val ${cls(v)}">${usd(v,true)}</div></div>`;}).join("")}
    ${custom?(()=>{const v=rangePnl();return `
      <div class="stat" style="border-color:var(--mint)"><div class="lbl">PnL ${wLbl}</div><div class="val ${cls(v)}">${usd(v,true)}</div></div>`;})():""}
    <div class="stat"><div class="lbl">Lifetime volume</div><div class="val mut">${usd(vol)}</div></div>
  </section>

  <section class="panel">
    <div class="phead">
      <div class="ptitle">${metric==="pnl"?"Cumulative PnL":"Account value"}
        <span class="psub">· ${wLbl}</span></div>
      <div class="toggles">
        <div class="tgroup">
          <button class="tgl ${metric==="pnl"?"on":""}" data-metric="pnl">PnL</button>
          <button class="tgl ${metric==="equity"?"on":""}" data-metric="equity">Equity</button>
        </div>
        <div class="tgroup">
          ${PERIODS.map(([k,l])=>`<button class="tgl ${period===k?"on":""}" data-period="${k}">${l}</button>`).join("")}
        </div>
        <div class="tgroup">
          <input type="date" id="rs" class="dinput" value="${rsVal}" aria-label="Range start">
          <input type="date" id="re" class="dinput" value="${reVal}" aria-label="Range end">
          <button class="tgl ${period==="custom"?"on":""}" id="applyRange">Range</button>
        </div>
      </div>
    </div>
    <div class="chartbox"><canvas id="mainChart"></canvas></div>
  </section>

  ${bk.arr.length>1?`
  <section class="panel">
    <div class="ptitle">Profit &amp; capital flows
      <span class="psub">· ${wLbl} · by ${bk.daily?"day":"month"}</span></div>
    <div class="chartbox" style="height:230px;margin-top:12px"><canvas id="monthChart"></canvas></div>
  </section>`:""}

  <div class="cols">
    <section class="panel main">
      <div class="ptitle">Realized PnL by market
        <span class="psub">· ${nTrades} fills · ${wLbl}</span></div>
      ${coins.length?`
      <div class="tablewrap">
      <table>
        <thead><tr><th>Market</th><th>Realized</th><th>Fees</th><th>Net</th><th>Win rate</th><th>Fills</th></tr></thead>
        <tbody>
          ${coins.map(c=>`<tr>
            <td>${esc(c.coin)}</td>
            <td class="${cls(c.realized)}">${usd(c.realized,true)}</td>
            <td class="mut">${usd(-c.fees)}</td>
            <td class="${cls(c.net)}" style="font-weight:600">${usd(c.net,true)}</td>
            <td class="mut">${c.closes?Math.round(100*c.wins/c.closes)+"%":"—"}</td>
            <td class="mut">${c.trades}</td></tr>`).join("")}
          <tr>
            <td class="mut" style="font-weight:400;padding-top:12px">Total</td>
            <td class="${cls(totR)}" style="padding-top:12px">${usd(totR,true)}</td>
            <td class="mut" style="padding-top:12px">${usd(-totF)}</td>
            <td class="${cls(totR-totF)}" style="font-weight:700;padding-top:12px">${usd(totR-totF,true)}</td>
            <td></td><td></td></tr>
        </tbody>
      </table>
      </div>`:`<div class="empty">No fills returned for this account.</div>`}
    </section>

    <div class="side">
      <section class="panel">
        <div class="ptitle">Open positions</div>
        ${positions.length?positions.map(p=>`
          <div class="posrow">
            <div>
              <span style="font-weight:600">${esc(p.coin)}</span>
              <span class="${+p.szi>0?"pos":"neg"}" style="margin-left:8px;font-size:12px">
                ${+p.szi>0?"LONG":"SHORT"} ${p.leverage?.value?p.leverage.value+"×":""}</span>
              <div class="meta">${Math.abs(+p.szi)} @ ${esc(p.entryPx)}</div>
            </div>
            <div style="text-align:right">
              <div class="${cls(p.unrealizedPnl)}" style="font-family:var(--mono);font-weight:600">${usd(p.unrealizedPnl,true)}</div>
              <div class="meta">${(+p.returnOnEquity*100).toFixed(1)}% ROE</div>
            </div>
          </div>`).join(""):`<div class="empty">Flat — no open perp positions.</div>`}
      </section>
      <section class="panel">
        <div class="ptitle">Funding · ${wLbl}</div>
        <div class="bignum ${cls(fundTot)}">${usd(fundTot,true)}</div>
        <div class="meta" style="margin-top:4px;color:var(--dim);font-size:12px">
          ${(activeFunding||[]).length} funding payments · net paid/received</div>
      </section>
      <section class="panel">
        <div class="ptitle">Capital flows · ${wLbl}</div>
        <div style="display:flex;gap:18px;margin-top:10px;flex-wrap:wrap">
          <div>
            <div class="lbl" style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase">In</div>
            <div style="font-family:var(--mono);font-weight:700;font-size:18px;margin-top:4px">${usd(flows.dep)}</div>
            <div class="meta" style="color:var(--dim);font-size:11px">${flows.depN} deposits &amp; transfers in</div>
          </div>
          <div>
            <div class="lbl" style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase">Out</div>
            <div style="font-family:var(--mono);font-weight:700;font-size:18px;margin-top:4px">${usd(flows.wd)}</div>
            <div class="meta" style="color:var(--dim);font-size:11px">${flows.wdN} withdrawals &amp; transfers out</div>
          </div>
          <div>
            <div class="lbl" style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase">Net flow</div>
            <div class="${cls(flows.dep-flows.wd)}" style="font-family:var(--mono);font-weight:700;font-size:18px;margin-top:4px">${usd(flows.dep-flows.wd,true)}</div>
            <div class="meta" style="color:var(--dim);font-size:11px">in − out</div>
          </div>
        </div>
        ${flows.recent.length?`
        <div style="margin-top:12px;border-top:1px solid rgba(22,51,44,.5)">
          ${flows.recent.slice(0,6).map(r=>`
            <div class="posrow">
              <div>
                <span style="font-size:13px">${r.kind}</span>
                <div class="meta">${fdate(r.t)}${r.fee?` · fee ${usd(r.fee)}`:""}${r.to?` · to ${esc(r.to.slice(0,6))}…${esc(r.to.slice(-4))}`:""}</div>
              </div>
              <div class="neg" style="font-family:var(--mono);font-weight:600">−${usd(r.amt)}</div>
            </div>`).join("")}
          ${flows.wdN>6?`<div class="meta" style="padding-top:8px;color:var(--dim);font-size:11px">+ ${flows.wdN-6} earlier outflows</div>`:""}
        </div>`:""}
      </section>
    </div>
  </div>

  <footer>Live from the public Hyperliquid info API. Every chart and panel is scoped to the
  selected window (${wLbl}). Fills, funding and transfers are fetched per window and cached;
  the API caps fill history at the 10,000 most recent, so very deep all-time market attribution
  can be partial. Deposits and withdrawals don't count as profit — PnL is trading only.</footer>`;

  // wire toggles — period changes fetch window-scoped data through one path
  const setPeriod = async (p, btn) => {
    const prev = { period, range: range && { ...range } };
    period = p;
    if (btn) { btn.textContent = "…"; btn.disabled = true; }
    try {
      winData = await getWinData();
    } catch (err) {
      period = prev.period; range = prev.range;
      alert("Window lookup failed: " + (err.message || err));
    }
    render();
  };
  document.querySelectorAll("[data-metric]").forEach(b=>b.onclick=()=>{metric=b.dataset.metric;render();});
  document.querySelectorAll("[data-period]").forEach(b=>b.onclick=()=>setPeriod(b.dataset.period, b));
  document.getElementById("rs").onchange = e => rsVal = e.target.value;
  document.getElementById("re").onchange = e => reVal = e.target.value;
  document.getElementById("applyRange").onclick = (e) => {
    const s = Date.parse(rsVal), en = Date.parse(reVal);
    if (isNaN(s) || isNaN(en) || s > en) { alert("Pick a valid start and end date first."); return; }
    range = { start: s, end: en + 86399999 };   // include the whole end day
    setPeriod("custom", e.target);
  };
  drawCharts(bk);
}

function drawCharts(bk) {
  const s = seriesFor();
  if (mainChart) { mainChart.destroy(); mainChart = null; }
  if (monthChart) { monthChart.destroy(); monthChart = null; }

  const ctx = document.getElementById("mainChart");
  if (ctx && s.length) {
    const vals = s.map(p=>p.v), max = Math.max(...vals), min = Math.min(...vals);
    const off = max<=0 ? 0 : min>=0 ? 1 : max/(max-min);
    const grad = c => {
      const g = c.createLinearGradient(0,0,0,300);
      g.addColorStop(0,"rgba(79,227,193,.35)"); g.addColorStop(Math.min(Math.max(off,0),1),"rgba(79,227,193,.03)");
      g.addColorStop(Math.min(Math.max(off,0),1),"rgba(255,122,107,.03)"); g.addColorStop(1,"rgba(255,122,107,.35)");
      return g;
    };
    mainChart = new Chart(ctx, {
      type:"line",
      data:{ labels:s.map(p=>p.t), datasets:[{
        data:vals, borderWidth:2, pointRadius:0, tension:.2, fill: metric==="pnl",
        borderColor: metric==="pnl" ? c => {
          const {ctx:cc, chartArea} = c.chart; if (!chartArea) return MINT;
          const g = cc.createLinearGradient(0,chartArea.top,0,chartArea.bottom);
          g.addColorStop(Math.min(Math.max(off,0),1),MINT); g.addColorStop(Math.min(Math.max(off,0),1),EMBER);
          return g;
        } : GOLD,
        backgroundColor: c => grad(c.chart.ctx),
      }]},
      options:{
        responsive:true, maintainAspectRatio:false, animation:false,
        interaction:{ mode:"index", intersect:false },
        plugins:{ legend:{display:false}, tooltip:{
          backgroundColor:"#081613", borderColor:EDGE, borderWidth:1,
          titleFont:{family:"monospace"}, bodyFont:{family:"monospace"},
          callbacks:{
            title: items => new Date(+items[0].label).toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}),
            label: i => (metric==="pnl"?"PnL ":"Equity ")+usd(i.parsed.y, metric==="pnl"),
          }}},
        scales:{
          x:{ grid:{display:false}, border:{color:EDGE},
              ticks:{ color:DIM, font:{family:"monospace",size:11}, maxTicksLimit:8,
                      callback:(v,i)=>fdate(+s[i]?.t) } },
          y:{ grid:{color:"rgba(22,51,44,.6)"}, border:{color:EDGE},
              ticks:{ color:DIM, font:{family:"monospace",size:11}, callback:v=>usd(v) } },
        },
      },
    });
  }

  const mctx = document.getElementById("monthChart");
  if (mctx && bk && bk.arr.length>1) {
    const a = bk.arr;
    const SKY = "#7CC4FF";
    monthChart = new Chart(mctx, {
      type:"bar",
      data:{ labels:a.map(b=>b.label), datasets:[
        { label:"PnL", data:a.map(b=>b.pnl), borderRadius:3,
          backgroundColor:a.map(b=>b.pnl>=0?"rgba(79,227,193,.85)":"rgba(255,122,107,.85)") },
        { label:"Deposits", data:a.map(b=>b.dep), borderRadius:3,
          backgroundColor:"rgba(124,196,255,.7)" },
        { label:"Withdrawals", data:a.map(b=>-b.wd), borderRadius:3,
          backgroundColor:"rgba(229,201,123,.7)" },
      ]},
      options:{
        responsive:true, maintainAspectRatio:false, animation:false,
        interaction:{ mode:"index", intersect:false },
        plugins:{
          legend:{ display:true, labels:{
            color:DIM, boxWidth:10, boxHeight:10, font:{family:"monospace",size:11},
            generateLabels: chart => {
              const l = Chart.defaults.plugins.legend.labels.generateLabels(chart);
              l[0].fillStyle = MINT; l[1].fillStyle = SKY; l[2].fillStyle = GOLD;
              l.forEach(x => x.strokeStyle = "transparent");
              return l;
            }}},
          tooltip:{
            backgroundColor:"#081613", borderColor:EDGE, borderWidth:1,
            bodyFont:{family:"monospace"}, titleFont:{family:"monospace"},
            callbacks:{ label:i=>`${i.dataset.label} ${usd(i.parsed.y, i.dataset.label==="PnL")}` }}},
        scales:{
          x:{ stacked:false, grid:{display:false}, border:{color:EDGE},
              ticks:{color:DIM,font:{family:"monospace",size:11},maxTicksLimit:16} },
          y:{ grid:{color:"rgba(22,51,44,.6)"}, border:{color:EDGE},
              ticks:{color:DIM,font:{family:"monospace",size:11},callback:v=>usd(v)} },
        },
      },
    });
  }
}

document.getElementById("addrForm").addEventListener("submit", e => {
  e.preventDefault(); load(document.getElementById("addr").value);
});

const refreshBtn = document.getElementById("refreshBtn");
refreshBtn.onclick = async () => {
  if (refreshBtn.disabled) return;
  refreshBtn.disabled = true; refreshBtn.classList.add("spin");
  try { await load(currentUser || document.getElementById("addr").value); }
  finally { refreshBtn.disabled = false; refreshBtn.classList.remove("spin"); }
};

// Refresh when the page becomes visible again (tab switch, phone unlock,
// bfcache restore) if the data is more than a minute old.
const STALE_MS = 60 * 1000;
const maybeRefresh = () => {
  if (currentUser && D && Date.now() - lastRefresh > STALE_MS) load(currentUser);
};
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") maybeRefresh();
});
window.addEventListener("pageshow", e => { if (e.persisted) maybeRefresh(); });

try {
  const saved = localStorage.getItem("hlpnl:addr");
  if (saved) document.getElementById("addr").value = saved;
} catch (e) {}
load(document.getElementById("addr").value);
</script>
</body>
</html>
